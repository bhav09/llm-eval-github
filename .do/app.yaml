name: fde-issue-eval
region: nyc

services:
  - name: web
    # --- OPTION A: Deploy from GitHub (Recommended) ---
    # github:
    #   repo: <your-github-username>/<your-repo-name>   # e.g., bhavishya/llm-eval-github
    #   branch: main
    #   deploy_on_push: true

    # --- OPTION B: Deploy from DigitalOcean Container Registry (DOCR) ---
    # image:
    #   registry_type: DOCR
    #   repository: fde-issue-eval
    #   tag: latest

    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    envs:
      - key: DO_API
        scope: RUN_TIME
        type: SECRET
      - key: GITHUB_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: CONCURRENCY
        scope: RUN_TIME
        value: "8"
      - key: CHECKPOINT_EVERY_N
        scope: RUN_TIME
        value: "50"
