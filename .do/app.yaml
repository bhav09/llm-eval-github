name: fde-issue-eval
region: nyc

services:
  - name: web
    git:
      repo_clone_url: https://github.com/bhav09/llm-eval-github.git
      branch: main

    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    envs:
      - key: DO_API
        scope: RUN_TIME
        type: SECRET
      - key: GITHUB_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: CONCURRENCY
        scope: RUN_TIME
        value: "8"
      - key: CHECKPOINT_EVERY_N
        scope: RUN_TIME
        value: "50"
